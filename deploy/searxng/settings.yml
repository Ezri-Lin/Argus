use_default_settings: true
server:
  secret_key: "argus-local-instance"
  limiter: false
  image_proxy: false
  bind_address: "0.0.0.0"
search:
  safe_search: 0
  autocomplete: ""
  default_lang: "auto"
  formats:
    - html
    - json
engines:
  - name: duckduckgo
    disabled: false
  - name: brave
    disabled: false
  - name: bing
    disabled: false
  - name: google
    disabled: true  # CAPTCHA risk
