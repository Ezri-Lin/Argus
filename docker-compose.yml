services:
  argus:
    build: .
    container_name: argus
    ports:
      - "8000:8000"
    volumes:
      - argus-data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/searxng:/etc/searxng
    environment:
      - BASE_URL=http://localhost:8080/
      - INSTANCE_NAME=argus-search
      - SEARXNG_SECRET=argus-local-secret-key-12345
      - SEARXNG_LIMITER=false
      - SEARXNG_DEBUG=true
    restart: unless-stopped

volumes:
  argus-data:
